spring.application.name=backend

server.port=8080

spring.datasource.url=jdbc:postgresql://127.0.0.1:5433/aguafutura
spring.datasource.username=aguafutura
spring.datasource.password=aguafutura123
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI / OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.data.mongodb.uri=mongodb://localhost:27017/aguafutura

spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.jpa.open-in-view=false

security.jwt.secret=aguafutura-super-secret-key-for-jwt-signature-2026
security.jwt.expiration-minutes=60